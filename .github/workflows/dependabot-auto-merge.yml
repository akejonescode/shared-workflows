name: Dependabot auto-merge (reusable)

# Reusable workflow — call this from a repo-level workflow that triggers on
# workflow_run (CI completion). The caller defines which CI workflow name to
# listen to; this workflow handles PR resolution, semver classification, and
# the actual merge or review comment.
#
# Caller example:
#
#   on:
#     workflow_run:
#       workflows: ["CI"]
#       types: [completed]
#
#   jobs:
#     auto-merge:
#       uses: akejonescode/shared-workflows/.github/workflows/dependabot-auto-merge.yml@main
#       secrets: inherit
#       with:
#         conservative_zero_x_minors: true

on:
  workflow_call:
    inputs:
      conservative_zero_x_minors:
        description: >
          Treat 0.X → 0.Y bumps as major. Pre-1.0 semver allows breaking
          changes at minor increments, so this defaults to true (safe).
        type: boolean
        default: true

# Permissions apply to the jobs below, running in the calling repo's context.
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Guard: only proceed when CI passed on a Dependabot pull_request event,
    # and the branch name confirms Dependabot authorship (double safety).
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')

    steps:
      # ── Step 1: find the PR and classify its semver bump ─────────────────
      - name: Resolve PR and classify semver bump
        id: classify
        uses: actions/github-script@v7
        env:
          CONSERVATIVE_ZERO_X: ${{ inputs.conservative_zero_x_minors }}
        with:
          script: |
            const headBranch = context.payload.workflow_run.head_branch;

            // Find the open PR associated with this Dependabot branch.
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              head:  `${context.repo.owner}:${headBranch}`,
            });

            if (prs.length === 0) {
              core.info(`No open PR for branch ${headBranch} – skipping`);
              core.setOutput('skip', 'true');
              return;
            }

            const pr = prs[0];
            core.setOutput('pr_number', String(pr.number));
            core.info(`PR #${pr.number}: ${pr.title}`);

            // Belt-and-suspenders: confirm the PR author is Dependabot.
            if (pr.user.login !== 'dependabot[bot]') {
              core.info(`PR author is ${pr.user.login}, not dependabot[bot] – skipping`);
              core.setOutput('skip', 'true');
              return;
            }

            const title = pr.title;

            // Grouped updates (e.g. "bump the patch-updates group with 3 updates").
            // Dependabot only creates patch groups per our dependabot.yml config,
            // so treat all grouped PRs as patch.
            if (/\bgroup\b.+\bupdate/i.test(title)) {
              core.info('Grouped update PR – classifying as patch');
              core.setOutput('bump', 'patch');
              return;
            }

            // Standard three-part semver: "from X.Y.Z to A.B.C"
            // Handles prefixes like ^ ~ >= in the version strings.
            const m = title.match(
              /from\s+[\^~>=<\s]*(\d+)\.(\d+)\.(\d+)[^\s]*\s+to\s+[\^~>=<\s]*(\d+)\.(\d+)\.(\d+)/i
            );
            if (!m) {
              core.info(`Could not parse semver from title: "${title}" – skipping`);
              core.setOutput('bump', 'unknown');
              return;
            }

            const [oldMaj, oldMin, oldPatch] = [+m[1], +m[2], +m[3]];
            const [newMaj, newMin, newPatch] = [+m[4], +m[5], +m[6]];

            let bump;
            if (newMaj > oldMaj) {
              bump = 'major';
            } else if (newMin > oldMin) {
              // When conservative_zero_x_minors is true, treat 0.X→0.Y as major
              // because semver spec allows breaking changes before 1.0.
              const conservative = process.env.CONSERVATIVE_ZERO_X === 'true';
              bump = (conservative && oldMaj === 0) ? 'major' : 'minor';
            } else if (newPatch > oldPatch) {
              bump = 'patch';
            } else {
              bump = 'none';
            }

            core.setOutput('bump', bump);
            core.info(`${oldMaj}.${oldMin}.${oldPatch} → ${newMaj}.${newMin}.${newPatch} = ${bump}`);

      # ── Step 2: merge patch and minor updates automatically ───────────────
      - name: Squash-merge patch and minor updates
        if: >
          steps.classify.outputs.skip != 'true' &&
          (steps.classify.outputs.bump == 'patch' ||
           steps.classify.outputs.bump == 'minor')
        run: |
          gh pr merge --squash --delete-branch "${{ steps.classify.outputs.pr_number }}" \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 3: flag major bumps for human review ─────────────────────────
      - name: Comment on major version bumps
        if: >
          steps.classify.outputs.skip != 'true' &&
          steps.classify.outputs.bump == 'major'
        run: |
          gh pr comment "${{ steps.classify.outputs.pr_number }}" \
            --body "🔶 **Major version bump detected.** CI passed, but major updates can introduce breaking changes — please review the changelog before merging." \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
